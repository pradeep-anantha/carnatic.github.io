<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnatic Flute Syllabus</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f6fa;
}

.header {
  padding: 15px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.tabs button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 20px;
  background: #ddd;
  cursor: pointer;
}

.tabs button.active {
  background: #4CAF50;
  color: white;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.category {
  font-weight: bold;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="header">
  <h2>🎶 Carnatic Flute Syllabus</h2>

  <div id="levels" class="tabs"></div>
  <div id="sections" class="tabs"></div>
</div>

<div id="content" class="container"></div>

<script>

const supabase = window.supabase.createClient(
  "https://jlnyecsqjdphgsaabyja.supabase.co",
  "sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk"
);

let categoriesMap = {};
let subcategoriesMap = {};

// =====================
// INIT
// =====================
async function init() {

  // preload categories
  const { data: categories } = await supabase.from('categories').select('*');
  categories.forEach(c => categoriesMap[c.id] = c.name);

  const { data: subcategories } = await supabase.from('subcategories').select('*');
  subcategories.forEach(s => subcategoriesMap[s.id] = s.name);

  // load levels
  const { data: levels } = await supabase.from('levels').select('*');

  const levelDiv = document.getElementById('levels');

  levels.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.innerText = l.name;
    btn.onclick = () => loadSections(l, btn);
    levelDiv.appendChild(btn);

    if (i === 0) loadSections(l, btn);
  });
}

// =====================
// LOAD SECTIONS
// =====================
async function loadSections(level, btn) {

  setActive('levels', btn);

  const { data: sections } = await supabase
    .from('sections')
    .select('*')
    .eq('level_id', level.id);

  const sectionDiv = document.getElementById('sections');
  sectionDiv.innerHTML = '';

  sections.forEach((s, i) => {
    const b = document.createElement('button');
    b.innerText = s.name;
    b.onclick = () => loadSyllabus(s, b);
    sectionDiv.appendChild(b);

    if (i === 0) loadSyllabus(s, b);
  });
}

// =====================
// LOAD SYLLABUS
// =====================
async function loadSyllabus(section, btn) {

  setActive('sections', btn);

  const { data } = await supabase
    .from('syllabus')
    .select('*')
    .eq('section_id', section.id);

  render(data);
}

// =====================
// RENDER
// =====================
function render(data) {

  const container = document.getElementById('content');
  container.innerHTML = '';

  const grouped = {};

  data.forEach(item => {
    const cat = categoriesMap[item.category_id] || 'Other';

    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  });

  Object.keys(grouped).forEach(cat => {

    const card = document.createElement('div');
    card.className = 'card';

    const title = document.createElement('div');
    title.className = 'category';
    title.innerText = cat;

    card.appendChild(title);

    grouped[cat].forEach(item => {

      const div = document.createElement('div');

      let text = '';

      if (item.subcategory_id) {
        text += subcategoriesMap[item.subcategory_id] + ': ';
      }

      text += item.value;

      if (item.notes) {
        text += ` (${item.notes})`;
      }

      div.innerText = text;
      card.appendChild(div);
    });

    container.appendChild(card);
  });
}

// =====================
// ACTIVE TAB
// =====================
function setActive(id, btn) {
  const parent = document.getElementById(id);
  Array.from(parent.children).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// START
init();

</script>

</body>
</html>
