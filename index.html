<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carnatic Learning</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            background: #6366f1;
            color: white;
        }

        .container { max-width: 900px; margin: auto; padding: 20px; }

        .card, .sub-card {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .sub-card { margin-left: 10px; }

        .content { display: none; margin-left: 15px; }

        .lesson {
            padding: 6px;
            margin: 4px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }

        .notation {
            font-family: "Courier New", monospace;
            font-size: 20px;
            margin-left: 10px;
            white-space: pre;
        }

        button { margin-right: 10px; padding: 6px 12px; }
    </style>
</head>

<body>

<div class="header">Carnatic Learning</div>
<div id="app" class="container">Initializing...</div>

<script>
    window.onload = function () {

        const URL="https://jlnyecsqjdphgsaabyja.supabase.co";
        const KEY="sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk";

        const app=document.getElementById("app");

        let lang="kn";
        let appData=null;
        let lessonContent=[];

        /* 🎯 FORMAT SWARA */
        function formatSwara(text){
            if(!text) return "";

            text = text.trim().toUpperCase();

            text = text.replace(/S''/g,"Ṡ").replace(/S'/g,"Ṡ");

            text = text
                .replace(/R1/g,"R₁").replace(/R2/g,"R₂").replace(/R3/g,"R₃")
                .replace(/G1/g,"G₁").replace(/G2/g,"G₂").replace(/G3/g,"G₃")
                .replace(/M1/g,"M₁").replace(/M2/g,"M₂")
                .replace(/D1/g,"D₁").replace(/D2/g,"D₂").replace(/D3/g,"D₃")
                .replace(/N1/g,"N₁").replace(/N2/g,"N₂").replace(/N3/g,"N₃");

            return text;
        }

        /* 🎯 KANNADA SWARA (FIXED) */
        function toKannadaSwara(text){

            // safe upper octave
            text = text.replace(/Ṡ/g,"ಸ'");

            return text
                .replace(/S/g,"ಸ")
                .replace(/R/g,"ರಿ")
                .replace(/G/g,"ಗ")
                .replace(/M/g,"ಮ")
                .replace(/P/g,"ಪ")
                .replace(/D/g,"ದ")
                .replace(/N/g,"ನಿ");
        }

        /* NAME */
        function getName(obj){
            return lang==="kn"
                ? (obj.name_kn || obj.name)
                : (obj.name_en || obj.name);
        }

        function createDiv(cls,text){
            const d=document.createElement("div");
            d.className=cls;
            d.innerText=text;
            return d;
        }

        function toggle(card,content){
            card.onclick=()=>{
                content.style.display =
                    content.style.display==="block"?"none":"block";
            };
        }

        /* 🎯 RENDER */
        function render(){

            app.innerHTML="";

            const bar=document.createElement("div");

            const knBtn=document.createElement("button");
            knBtn.innerText="ಕನ್ನಡ";
            knBtn.onclick=()=>{lang="kn"; render();};

            const enBtn=document.createElement("button");
            enBtn.innerText="English";
            enBtn.onclick=()=>{lang="en"; render();};

            bar.appendChild(knBtn);
            bar.appendChild(enBtn);
            app.appendChild(bar);

            const {levels,sections,topics,lessons}=appData;

            levels.forEach(level=>{

                const levelCard=createDiv("card",getName(level));
                const levelContent=createDiv("content","");

                sections.filter(s=>s.level_id===level.id)
                    .forEach(section=>{

                        const secCard=createDiv("sub-card",getName(section));
                        const secContent=createDiv("content","");

                        topics.filter(t=>t.section_id===section.id)
                            .forEach(topic=>{

                                const topicCard=createDiv("sub-card",getName(topic));
                                const topicContent=createDiv("content","");

                                lessons
                                    .filter(l=>l.topic_id===topic.id)
                                    .sort((a,b)=>(a.display_order||0)-(b.display_order||0))
                                    .forEach(lesson=>{

                                        const lessonDiv=createDiv("lesson",getName(lesson));
                                        const swaraDiv=document.createElement("div");

                                        lessonDiv.onclick=()=>{

                                            swaraDiv.innerHTML="";

                                            const rows = lessonContent
                                                .filter(c=>c.lesson_id===lesson.id)
                                                .sort((a,b)=>a.line_no-b.line_no);

                                            rows.forEach(r=>{
                                                let txt = (lang==="kn" && r.content_kn && r.content_kn.trim())
                                                    ? r.content_kn
                                                    : r.content_en;

                                                let formatted = formatSwara(txt);

                                                if(lang==="kn"){
                                                    formatted = toKannadaSwara(formatted);
                                                }

                                                const line=document.createElement("div");
                                                line.className="notation";
                                                line.innerHTML = formatted;

                                                swaraDiv.appendChild(line);
                                            });
                                        };

                                        topicContent.appendChild(lessonDiv);
                                        topicContent.appendChild(swaraDiv);
                                    });

                                toggle(topicCard,topicContent);
                                secContent.appendChild(topicCard);
                                secContent.appendChild(topicContent);
                            });

                        toggle(secCard,secContent);
                        levelContent.appendChild(secCard);
                        levelContent.appendChild(secContent);
                    });

                toggle(levelCard,levelContent);
                app.appendChild(levelCard);
                app.appendChild(levelContent);
            });
        }

        /* LOAD */
        async function load(){

            const supabase=window.supabase.createClient(URL,KEY);

            const [l1,l2,l3,l4,l5]=await Promise.all([
                supabase.from("levels").select("*"),
                supabase.from("sections").select("*"),
                supabase.from("topics").select("*"),
                supabase.from("lessons").select("*"),
                supabase.from("lesson_content").select("*")
            ]);

            appData={
                levels:l1.data||[],
                sections:l2.data||[],
                topics:l3.data||[],
                lessons:l4.data||[]
            };

            lessonContent = l5.data || [];

            render();
        }

        load();

    };
</script>

</body>
</html>
