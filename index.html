<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carnatic Learning</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Noto+Sans+Kannada&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Noto Sans", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .header {
            padding: 14px;
            text-align: center;
            font-size: 20px;
            background: #6366f1;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 16px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .search {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        .card, .sub-card {
            background: rgba(255,255,255,0.08);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .sub-card { margin-left: 10px; }

        .content {
            display: none;
            margin-left: 14px;
        }

        .lesson {
            padding: 6px;
            margin: 4px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }

        .hidden {
            display: none !important;
        }

        .notation {
            font-size: 22px;
            margin: 8px 0;
            padding: 8px;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            text-align: center;
        }

        .swara,.symbol {
            display: inline-block;
            min-width: 22px;
            text-align: center;
            margin-right: 5px;
        }

        .bar { margin: 0 10px; font-weight: bold; }
    </style>
</head>

<body>

<div class="header">Carnatic Learning</div>

<div class="container">
    <div class="toolbar">
        <input id="search" class="search" placeholder="Search (sarali 5)">
        <button id="knBtn">Kannada</button>
        <button id="enBtn">English</button>
    </div>

    <div id="app">Loading...</div>
</div>

<script>

    /* ✅ CORRECT CONFIG */
    const SUPABASE_URL = "https://jlnyecsqjdphgsaabyja.supabase.co".trim();
    const SUPABASE_KEY = "sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk".trim();

    let appData, lessonContent, lang="kn";

    /* ---------- SAFE NAME ---------- */
    function getName(o){
        return lang==="kn" ? (o.name_kn||o.name||"") : (o.name_en||o.name||"");
    }

    /* ---------- TOKEN ---------- */
    function formatTokens(t){
        if(!t) return [];
        return t.split(/\s+/).map(x=>{
            if(["|","||",","].includes(x)) return x;
            const m=x.match(/^([SRGMPDN])(1|2|3)?('?)/);
            if(!m) return x;
            let b=m[1]; if(b==="S"&&m[3]) b="Ṡ";
            return {b,n:m[2]};
        });
    }

    function toKn(b){
        return {S:"ಸ",R:"ರಿ",G:"ಗ",M:"ಮ",P:"ಪ",D:"ದ",N:"ನಿ","Ṡ":"ಸ̇"}[b]||b;
    }

    function renderLine(el,t){
        formatTokens(t).forEach(x=>{
            const s=document.createElement("span");
            if(typeof x==="string"){
                s.innerText=x;
                s.className=(x==="|"||x==="||")?"symbol bar":"symbol";
            } else {
                s.className="swara";
                s.innerText=lang==="kn"?toKn(x.b):x.b;
                if(x.n){
                    const sub=document.createElement("sub");
                    sub.innerText=x.n;
                    s.appendChild(sub);
                }
            }
            el.appendChild(s);
        });
    }

    /* ---------- HELPERS ---------- */
    function div(cls,text=""){
        const d=document.createElement("div");
        d.className=cls;
        d.innerText=text;
        return d;
    }

    function toggle(card,content){
        card.onclick=(e)=>{
            e.stopPropagation();
            content.style.display = content.style.display==="block"?"none":"block";
        };
    }

    /* ---------- BUILD TREE ---------- */
    function buildTree(){

        const app=document.getElementById("app");
        app.innerHTML="";

        const {levels,sections,topics,lessons}=appData;

        levels.forEach(level=>{
            const lCard=div("card",getName(level));
            const lCont=div("content");
            toggle(lCard,lCont);

            sections.filter(s=>+s.level_id===+level.id)
                .forEach(section=>{

                    const sCard=div("sub-card",getName(section));
                    const sCont=div("content");
                    toggle(sCard,sCont);

                    topics.filter(t=>+t.section_id===+section.id)
                        .forEach(topic=>{

                            const tCard=div("sub-card",getName(topic));
                            const tCont=div("content");
                            toggle(tCard,tCont);

                            lessons.filter(l=>+l.topic_id===+topic.id)
                                .sort((a,b)=>(a.display_order??a.id)-(b.display_order??b.id))
                                .forEach(lesson=>{

                                    const l=div("lesson",getName(lesson));
                                    l.dataset.name=getName(lesson).toLowerCase();

                                    const out=document.createElement("div");

                                    l.onclick=()=>{
                                        out.innerHTML="";
                                        lessonContent
                                            .filter(c=>+c.lesson_id===+lesson.id)
                                            .sort((a,b)=>a.line_no-b.line_no)
                                            .forEach(r=>{
                                                const line=div("notation");
                                                renderLine(line,r.content_en||"");
                                                out.appendChild(line);
                                            });
                                    };

                                    tCont.appendChild(l);
                                    tCont.appendChild(out);
                                });

                            sCont.appendChild(tCard);
                            sCont.appendChild(tCont);
                        });

                    lCont.appendChild(sCard);
                    lCont.appendChild(sCont);
                });

            app.appendChild(lCard);
            app.appendChild(lCont);
        });
    }

    /* ---------- SEARCH ---------- */
    function applySearch(){

        const term = document.getElementById("search").value
            .toLowerCase()
            .replace(/\s+/g, "");

        const lessons = document.querySelectorAll(".lesson");

        lessons.forEach(l => {

            const name = (l.dataset.name || "")
                .toLowerCase()
                .replace(/\s+/g, "");

            const match = !term || name.includes(term);

            // 🔥 FIX: hide BOTH lesson + its details
            const details = l.nextElementSibling;

            if (match) {
                l.classList.remove("hidden");
                if (details) details.classList.remove("hidden");

                // auto expand
                if (term) {
                    let el = l.parentElement;
                    while (el) {
                        if (el.classList.contains("content")) {
                            el.style.display = "block";
                        }
                        el = el.parentElement;
                    }
                }

            } else {
                l.classList.add("hidden");
                if (details) details.classList.add("hidden");
            }
        });

    }

    /* ---------- LOAD ---------- */
    async function load(){

        try {

            if (!window.supabase) throw new Error("Supabase not loaded");

            console.log("Using URL:", SUPABASE_URL);

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            const [l1,l2,l3,l4,l5] = await Promise.all([
                supabase.from("levels").select("*"),
                supabase.from("sections").select("*"),
                supabase.from("topics").select("*"),
                supabase.from("lessons").select("*"),
                supabase.from("lesson_content").select("*")
            ]);

            if (l1.error || l2.error || l3.error || l4.error || l5.error) {
                console.error(l1,l2,l3,l4,l5);
                throw new Error("Database fetch failed");
            }

            appData={
                levels:l1.data,
                sections:l2.data,
                topics:l3.data,
                lessons:l4.data
            };

            lessonContent=l5.data;

            buildTree();

        } catch(err){

            console.error(err);

            document.getElementById("app").innerHTML = `
      <div style="color:red;text-align:center;padding:20px">
        Failed to load data<br><br>${err.message}
      </div>
    `;
        }
    }

    /* ---------- INIT ---------- */
    window.addEventListener("load", () => {

        load();

        document.getElementById("search").addEventListener("input", applySearch);

        document.getElementById("knBtn").onclick=()=>{lang="kn"; buildTree();};
        document.getElementById("enBtn").onclick=()=>{lang="en"; buildTree();};

    });
</script>

</body>
</html>
