<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnatic Flute Syllabus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f6fa;
}

.header {
  padding: 15px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  margin-top: 10px;
}

.tabs button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 20px;
  background: #ddd;
  cursor: pointer;
}

.tabs button.active {
  background: #4CAF50;
  color: white;
}

.search input {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
}

.category {
  font-weight: bold;
  margin-bottom: 5px;
}

.item {
  margin-left: 10px;
}
</style>

</head>

<body>

<div class="header">
  <div class="title">🎶 Carnatic Flute Syllabus</div>

  <div id="levelTabs" class="tabs"></div>
  <div id="sectionTabs" class="tabs"></div>

  <div class="search">
    <input type="text" placeholder="Search..." onkeyup="searchData(this.value)">
  </div>
</div>

<div class="container" id="content"></div>

<script>

// 🔥 PUT YOUR KEY HERE
const SUPABASE_URL = "https://jlnyecsqjdphgsaabyja.supabase.co";
const SUPABASE_KEY = "sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentData = [];

// ======================
// INIT
// ======================
async function init() {
  const { data, error } = await supabase.from('levels').select('*');

  if (error) {
    console.error(error);
    alert("Error loading levels");
    return;
  }

  const levelTabs = document.getElementById('levelTabs');

  data.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.innerText = l.name;
    btn.onclick = () => loadLevel(l, btn);
    levelTabs.appendChild(btn);

    if (i === 0) loadLevel(l, btn);
  });
}

// ======================
// LOAD LEVEL
// ======================
async function loadLevel(level, btn) {

  setActive('levelTabs', btn);

  const { data: sections, error } = await supabase
    .from('sections')
    .select('*')
    .eq('level_id', level.id);

  if (error) {
    console.error(error);
    alert("Error loading sections");
    return;
  }

  const sectionTabs = document.getElementById('sectionTabs');
  sectionTabs.innerHTML = '';

  sections.forEach((s, i) => {
    const b = document.createElement('button');
    b.innerText = s.name;
    b.onclick = () => loadSection(s, b);
    sectionTabs.appendChild(b);

    if (i === 0) loadSection(s, b);
  });
}

// ======================
// LOAD SECTION
// ======================
async function loadSection(section, btn) {

  setActive('sectionTabs', btn);

  const { data, error } = await supabase
    .from('syllabus')
    .select(`
      id,
      content_type,
      value,
      notes,
      category_id,
      subcategory_id
    `)
    .eq('section_id', section.id);

  if (error) {
    console.error(error);
    alert("Error loading syllabus");
    return;
  }

  // Fetch categories separately
  const { data: categories } = await supabase.from('categories').select('*');
  const { data: subcategories } = await supabase.from('subcategories').select('*');

  // Map names
  data.forEach(item => {
    item.category = categories.find(c => c.id === item.category_id)?.name;
    item.subcategory = subcategories.find(s => s.id === item.subcategory_id)?.name;
  });

  currentData = data;
  render(data);
}

// ======================
// RENDER
// ======================
function render(data) {

  const container = document.getElementById('content');
  container.innerHTML = '';

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  Object.keys(grouped).forEach(cat => {

    const card = document.createElement('div');
    card.className = 'card';

    const title = document.createElement('div');
    title.className = 'category';
    title.innerText = cat;

    card.appendChild(title);

    grouped[cat].forEach(item => {
      const div = document.createElement('div');
      div.className = 'item';

      let text = '';

      if (item.subcategory) {
        text += item.subcategory + ": ";
      }

      text += item.value;

      if (item.notes) {
        text += ` (${item.notes})`;
      }

      div.innerText = text;
      card.appendChild(div);
    });

    container.appendChild(card);
  });
}

// ======================
// SEARCH
// ======================
function searchData(q) {
  q = q.toLowerCase();

  const filtered = currentData.filter(item =>
    (item.value || '').toLowerCase().includes(q) ||
    (item.notes || '').toLowerCase().includes(q) ||
    (item.category || '').toLowerCase().includes(q)
  );

  render(filtered);
}

// ======================
// ACTIVE TAB
// ======================
function setActive(parentId, btn) {
  const parent = document.getElementById(parentId);
  Array.from(parent.children).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// START
init();

</script>

</body>
</html>
