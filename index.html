<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnatic Learning</title>

<style>
body {
  font-family: "Noto Sans Kannada", "Segoe UI", sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  color: #1e293b;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.toggle {
  text-align: center;
  margin-bottom: 20px;
}

button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #6366f1;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #4f46e5;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card, .sub-card {
  background: white;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.sub-card {
  background: #f8fafc;
}

.content {
  display: none;
  padding: 10px;
}

.music {
  background: #fff;
  padding: 10px;
  margin: 6px 0;
  border-left: 4px solid #6366f1;
  font-family: monospace;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🎶 Carnatic Music Learning</h1>

<div class="toggle">
  <button onclick="setLang('kn')">ಕನ್ನಡ</button>
  <button onclick="setLang('en')">English</button>
</div>

<div id="app" class="container"></div>

<script>

let currentLang = "kn";
const HIGH_SA_KN = "ಸ\u0307";
const HIGH_SA_EN = "Ṡ";

// ================= SARALI DATA =================
const saraliRaw = [
  [
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N D P", "M G R S"]
  ],
  [
    ["S R S R", "S R G M"],
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N Ṡ N", "Ṡ N D P"],
    ["Ṡ N D P", "M G R S"]
  ],
  [
    ["S R G S", "R G S R"],
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N D Ṡ", "N D Ṡ N"],
    ["Ṡ N D P", "M G R S"]
  ],
  [
    ["S R G M", "S R G M"],
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N D P", "Ṡ N D P"],
    ["Ṡ N D P", "M G R S"]
  ],
  [
    ["S R G M", "P Ṡ R S"],
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N D P", "M Ṡ N"],
    ["Ṡ N D P", "M G R S"]
  ],
  [
    ["S R G M", "P D S R"],
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N D P", "M G Ṡ N"],
    ["Ṡ N D P", "M G R S"]
  ],
  [
    ["S R G M", "P D N"],
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N D P", "M G R"],
    ["Ṡ N D P", "M G R S"]
  ],
  [
    ["S R G M", "P M G R"],
    ["S R G M", "P D N Ṡ"],
    ["Ṡ N D P", "M P D N"],
    ["Ṡ N D P", "M G R S"]
  ]
];

// ================= CONVERSION =================

function toKannada(line) {
  return line
    .replace(/S/g, "ಸ")
    .replace(/R/g, "ರಿ₁")
    .replace(/G/g, "ಗ₃")
    .replace(/M/g, "ಮ₁")
    .replace(/P/g, "ಪ")
    .replace(/D/g, "ದ₁")
    .replace(/N/g, "ನಿ₃")
    .replace(/Ṡ/g, HIGH_SA_KN);
}

function toEnglish(line) {
  return line.replace(/Ṡ/g, HIGH_SA_EN);
}

// ================= BUILD UI =================

function buildUI() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const mainCard = document.createElement("div");
  mainCard.className = "card";
  mainCard.innerHTML = "🎵 ಸ್ವರಾವಳಿ <span>▼</span>";

  const mainContent = document.createElement("div");
  mainContent.className = "content";

  saraliRaw.forEach((lesson, index) => {

    const subCard = document.createElement("div");
    subCard.className = "sub-card";
    subCard.innerHTML = `ಸರಳಿ ${index+1} <span>▶</span>`;

    const subContent = document.createElement("div");
    subContent.className = "content";

    lesson.forEach(line => {

      let text = line.join(" | ") + " ||";

      if (currentLang === "kn") text = toKannada(text);
      else text = toEnglish(text);

      subContent.innerHTML += `<div class="music">${text}</div>`;
    });

    subCard.onclick = (e) => {
      e.stopPropagation();
      subContent.style.display =
        subContent.style.display === "block" ? "none" : "block";
    };

    mainContent.appendChild(subCard);
    mainContent.appendChild(subContent);
  });

  mainCard.onclick = () => {
    mainContent.style.display =
      mainContent.style.display === "block" ? "none" : "block";
  };

  app.appendChild(mainCard);
  app.appendChild(mainContent);
}

// ================= TOGGLE =================

function setLang(lang) {
  currentLang = lang;
  buildUI();
}

// INIT
buildUI();

</script>

</body>
</html>
