<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnatic Learning</title>

<style>
body {
  font-family: "Noto Sans Kannada", sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
}

h1 { text-align: center; }

.toggle { text-align:center; margin-bottom:15px; }

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #6366f1;
  color: white;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card, .sub-card {
  background: white;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.sub-card { background:#f8fafc; }

.content {
  display:none;
  padding:10px;
}

.music {
  font-family: monospace;
  padding:8px;
  border-left:4px solid #6366f1;
  margin-bottom:6px;
}

.theory {
  padding:8px;
  border-left:4px solid #10b981;
  margin-bottom:6px;
}
</style>
</head>

<body>

<h1>🎶 Carnatic Learning</h1>

<div class="toggle">
  <button onclick="setLang('kn')">ಕನ್ನಡ</button>
  <button onclick="setLang('en')">English</button>
</div>

<div id="app" class="container"></div>

<script>

let lang = "kn";
const HIGH_SA_KN = "ಸ\u0307";
const HIGH_SA_EN = "Ṡ";

// ================= SARALI =================
const sarali = [
["S R G M","P D N Ṡ"],
["Ṡ N D P","M G R S"]
];

// ================= RAGA =================
const raga = {
name: {
  kn: "ಮಾಯಾಮಾಳವಗೌಳ",
  en: "Mayamalavagowla"
},
arohana: "S R1 G3 M1 P D1 N3 Ṡ",
avarohana: "Ṡ N3 D1 P M1 G3 R1 S",
swaras: [
"Shadjam (S)",
"R1 - Shuddha Rishabham",
"G3 - Antara Gandharam",
"M1 - Shuddha Madhyamam",
"P - Panchamam",
"D1 - Shuddha Daivatam",
"N3 - Kakali Nishadam"
],
notes: "Fundamental beginner raga used for Sarali, Janti"
};

// ================= CONVERT =================
function toKannada(text){
  return text
  .replace(/S/g,"ಸ")
  .replace(/R1/g,"ರಿ₁")
  .replace(/G3/g,"ಗ₃")
  .replace(/M1/g,"ಮ₁")
  .replace(/P/g,"ಪ")
  .replace(/D1/g,"ದ₁")
  .replace(/N3/g,"ನಿ₃")
  .replace(/Ṡ/g,HIGH_SA_KN);
}

// ================= UI =================
function buildUI(){

const app = document.getElementById("app");
app.innerHTML="";

// ===== SWARAVALI =====
const swaraCard = createCard("🎵 ಸ್ವರಾವಳಿ");

const saraliCard = createSubCard("ಸರಳಿ ವರಸೆಗಳು");
const saraliContent = createContent();

sarali.forEach(l=>{
  let line = l.join(" | ") + " ||";
  if(lang==="kn") line = toKannada(line);
  saraliContent.innerHTML += `<div class="music">${line}</div>`;
});

attachToggle(saraliCard, saraliContent);
swaraCard.content.append(saraliCard, saraliContent);

// ===== RAGA =====
const ragaCard = createCard("🎼 ಮೇಳಕರ್ತ ರಾಗಗಳು");

const mmgCard = createSubCard(raga.name[lang]);
const mmgContent = createContent();

let aro = lang==="kn" ? toKannada(raga.arohana) : raga.arohana;
let ava = lang==="kn" ? toKannada(raga.avarohana) : raga.avarohana;

mmgContent.innerHTML = `
<div class="theory"><b>ಆರೋಹಣ:</b> ${aro}</div>
<div class="theory"><b>ಅವರೋಹಣ:</b> ${ava}</div>
<div class="theory"><b>ಸ್ವರಸ್ಥಾನಗಳು:</b><br>${raga.swaras.join("<br>")}</div>
<div class="theory">${raga.notes}</div>
`;

attachToggle(mmgCard, mmgContent);
ragaCard.content.append(mmgCard, mmgContent);

// ===== THEORY =====
const theoryCard = createCard("📘 ಶಾಸ್ತ್ರ ಭಾಗ");

const swaraTheory = createSubCard("7 ಸ್ವರಗಳು");
const swaraContent = createContent();

swaraContent.innerHTML = `
<div class="theory">
ಸ ರಿ ಗ ಮ ಪ ದ ನಿ
</div>
`;

attachToggle(swaraTheory, swaraContent);
theoryCard.content.append(swaraTheory, swaraContent);

// ===== APPEND =====
app.append(
  swaraCard.card, swaraCard.content,
  ragaCard.card, ragaCard.content,
  theoryCard.card, theoryCard.content
);
}

// ===== HELPERS =====
function createCard(title){
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=title+" <span>▼</span>";

  const content=createContent();
  attachToggle(card,content);

  return {card,content};
}

function createSubCard(title){
  const card=document.createElement("div");
  card.className="sub-card";
  card.innerHTML=title+" <span>▶</span>";
  return card;
}

function createContent(){
  const div=document.createElement("div");
  div.className="content";
  return div;
}

function attachToggle(card,content){
  card.onclick=(e)=>{
    e.stopPropagation();
    content.style.display =
      content.style.display==="block"?"none":"block";
  };
}

// ===== LANGUAGE =====
function setLang(l){
  lang=l;
  buildUI();
}

// INIT
buildUI();

</script>

</body>
</html>
