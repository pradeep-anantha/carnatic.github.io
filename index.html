<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carnatic Learning App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">

<!-- HEADER -->
<header class="flex justify-between items-center p-4 border-b border-gray-700 bg-black">
  <h1 id="title" class="text-xl font-bold">Carnatic Learning</h1>

  <!-- Language Toggle -->
  <div class="flex gap-2">
    <button onclick="setLanguage('en')" class="px-3 py-1 bg-indigo-600 rounded">English</button>
    <button onclick="setLanguage('kn')" class="px-3 py-1 bg-indigo-600 rounded">ಕನ್ನಡ</button>
  </div>
</header>

<!-- TABS -->
<nav class="flex flex-wrap gap-3 p-4 bg-gray-800 border-b border-gray-700">
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'basic')">Basic Exercises</button>
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'varnas')">Varnas</button>
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'mk')">Madhyama Keerthana</button>
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'vk')">Vilamba Keerthana</button>
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'tillana')">Tillana</button>
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'devaranama')">Devaranama</button>
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'vachana')">Vachana</button>
  <button class="tab-btn px-3 py-1 bg-gray-700 rounded" onclick="loadTab(event, 'composers')">Composers</button>
</nav>

<!-- CONTENT -->
<main id="content" class="p-6 text-lg">
  Click a tab to start
</main>

<script>
/* ---------------- LANGUAGE ---------------- */

let currentLang = "en";

function setLanguage(lang) {
  currentLang = lang;

  document.getElementById("title").innerText =
    lang === "en"
      ? "Carnatic Learning"
      : "ಕರ್ನಾಟಕ ಸಂಗೀತ ಕಲಿಕೆ";

  // Re-render current tab content
  if (currentTab) loadTab(null, currentTab, true);
}

/* ---------------- TAB LOGIC ---------------- */

let currentTab = null;

function loadTab(event, tab, isLanguageSwitch = false) {
  currentTab = tab;
  const content = document.getElementById("content");

  // Highlight active tab
  if (event) {
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.remove("bg-indigo-600");
      btn.classList.add("bg-gray-700");
    });

    event.target.classList.remove("bg-gray-700");
    event.target.classList.add("bg-indigo-600");
  }

  /* -------- CONTENT PER TAB -------- */

  if (tab === "basic") {
    content.innerHTML = `
      <h2 class="text-2xl mb-4">${translate("Basic Exercises")}</h2>

      ${exerciseSection("Sarali Varisai")}
      ${exerciseSection("Janta Varisai")}
      ${exerciseSection("Datu Varisai")}
      ${exerciseSection("Alankara")}
    `;
  }

  else {
    content.innerHTML = `
      <div class="bg-gray-800 p-4 rounded">
        <h2 class="text-xl mb-2">${translate(tab.toUpperCase())}</h2>
        <p>${translate("Content will be added here")}</p>
      </div>
    `;
  }
}

/* ---------------- EXERCISE GENERATOR ---------------- */

function exerciseSection(title) {
  let html = `
    <div class="mb-6">
      <h3 class="text-xl mb-2">${translate(title)}</h3>
  `;

  for (let i = 1; i <= 7; i++) {
    html += `
      <div class="bg-gray-800 p-3 mb-2 rounded">
        <p>${translate("Exercise")} ${i}</p>
        <p class="text-sm text-gray-300">
          ${translate("Speed 1")} | ${translate("Speed 2")} | ${translate("Speed 3")}
        </p>
      </div>
    `;
  }

  html += `</div>`;
  return html;
}

/* ---------------- TRANSLATION ---------------- */

function translate(text) {
  if (currentLang === "en") return text;

  const kn = {
    "Carnatic Learning": "ಕರ್ನಾಟಕ ಸಂಗೀತ ಕಲಿಕೆ",
    "Basic Exercises": "ಮೂಲ ಅಭ್ಯಾಸಗಳು",
    "Sarali Varisai": "ಸರಳಿ ವರಿಸೈ",
    "Janta Varisai": "ಜಂಟ ವರಿಸೈ",
    "Datu Varisai": "ದಟ್ಟು ವರಿಸೈ",
    "Alankara": "ಅಲಂಕಾರ",
    "Exercise": "ಅಭ್ಯಾಸ",
    "Speed 1": "ವೇಗ ೧",
    "Speed 2": "ವೇಗ ೨",
    "Speed 3": "ವೇಗ ೩",
    "Content will be added here": "ಇಲ್ಲಿ ವಿಷಯ ಸೇರಿಸಲಾಗುತ್ತದೆ"
  };

  return kn[text] || text;
}
</script>

</body>
</html>
