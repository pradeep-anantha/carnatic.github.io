<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carnatic Learning</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Noto+Sans+Kannada&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        body{
            margin:0;
            font-family:"Noto Sans","Noto Sans Kannada",sans-serif;
            background:#0f172a;
            color:#e2e8f0;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 16px;
            background:linear-gradient(90deg,#6366f1,#8b5cf6);
        }

        .title{font-size:18px;font-weight:600;}

        .controls{display:flex;gap:8px;}

        .search{
            padding:8px;
            border-radius:8px;
            border:none;
            width:220px;
        }

        button{
            padding:6px 10px;
            border:none;
            border-radius:6px;
            background:#4f46e5;
            color:white;
            cursor:pointer;
        }

        .container{max-width:950px;margin:auto;padding:16px;}

        .card,.sub-card{
            background:#1e293b;
            padding:12px;
            margin-bottom:8px;
            border-radius:10px;
            cursor:pointer;
        }

        .sub-card{margin-left:12px;}
        .content{display:none;margin-left:14px;}

        .lesson{
            padding:8px;
            margin:6px 0;
            background:#475569;
            border-radius:8px;
        }

        .hidden{display:none !important;}

        .highlight{
            background:yellow;
            color:black;
            padding:2px 4px;
            border-radius:4px;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="title">Carnatic Learning</div>

    <div class="controls">
        <input id="search" class="search" placeholder="Search sarali 5">
        <button id="knBtn">KN</button>
        <button id="enBtn">EN</button>
    </div>
</div>

<div class="container">
    <div id="app">Loading...</div>
</div>

<script>

    const SUPABASE_URL="https://jlnyecsqjdphgsaabyja.supabase.co";
    const SUPABASE_KEY="sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk";

    let appData, lessonContent, lang="kn";

    /* ---------- NAME ---------- */
    function getName(o){
        return lang==="kn" ? (o.name_kn||o.name||"") : (o.name_en||o.name||"");
    }

    /* ---------- FUZZY MATCH ---------- */
    function fuzzyMatch(text, search){
        let ti=0, si=0;
        while(ti<text.length && si<search.length){
            if(text[ti]===search[si]) si++;
            ti++;
        }
        return si===search.length;
    }

    /* ---------- SORT ---------- */
    function lessonSort(a,b){
        const getNum=(name,fallback)=>{
            const m=(name||"").match(/\d+/);
            return m?parseInt(m[0]):(fallback||0);
        };
        return getNum(a.name_en,a.display_order??a.id)
            - getNum(b.name_en,b.display_order??b.id);
    }

    /* ---------- BUILD TREE ---------- */
    function buildTree(){

        const app=document.getElementById("app");
        app.innerHTML="";

        const {levels,sections,topics,lessons}=appData;

        levels.forEach(level=>{
            const lCard=create("card",getName(level));
            const lCont=create("content");
            toggle(lCard,lCont);

            sections.filter(s=>+s.level_id===+level.id)
                .forEach(section=>{

                    const sCard=create("sub-card",getName(section));
                    const sCont=create("content");
                    toggle(sCard,sCont);

                    topics.filter(t=>+t.section_id===+section.id)
                        .forEach(topic=>{

                            const tCard=create("sub-card",getName(topic));
                            const tCont=create("content");
                            toggle(tCard,tCont);

                            lessons
                                .filter(l=>+l.topic_id===+topic.id)
                                .sort(lessonSort)
                                .forEach(lesson=>{

                                    const l=create("lesson",getName(lesson));
                                    l.dataset.name=getName(lesson).toLowerCase();

                                    const det=document.createElement("div");

                                    l.onclick=()=>{
                                        det.innerHTML="";
                                        lessonContent
                                            .filter(c=>+c.lesson_id===+lesson.id)
                                            .forEach(r=>{
                                                const line=create("card");
                                                line.innerText=r.content_en||"";
                                                det.appendChild(line);
                                            });
                                    };

                                    tCont.appendChild(l);
                                    tCont.appendChild(det);
                                });

                            sCont.appendChild(tCard);
                            sCont.appendChild(tCont);
                        });

                    lCont.appendChild(sCard);
                    lCont.appendChild(sCont);
                });

            app.appendChild(lCard);
            app.appendChild(lCont);
        });
    }

    /* ---------- HELPERS ---------- */
    function create(cls,text=""){
        const d=document.createElement("div");
        d.className=cls;
        d.innerText=text;
        return d;
    }

    function toggle(card,content){
        card.onclick=(e)=>{
            e.stopPropagation();
            content.style.display =
                content.style.display==="block"?"none":"block";
        };
    }

    /* ---------- SEARCH ---------- */
    function applySearch(){

        const raw = document.getElementById("search").value.toLowerCase().trim();
        const tokens = raw.split(/\s+/).filter(Boolean);

        const lessons = document.querySelectorAll(".lesson");

        // STEP 1: Hide everything initially
        document.querySelectorAll(".lesson, .sub-card, .card, .content")
            .forEach(el => el.classList.add("hidden"));

        lessons.forEach(l => {

            const original = l.dataset.name || "";
            const name = original.toLowerCase();
            const words = name.split(/\s+/);

            const match = tokens.every(t => {
                if(/^\d+$/.test(t)){
                    return words.includes(t);
                }
                return words.some(w => w.startsWith(t));
            });

            if(match){

                const det = l.nextElementSibling;

                // show lesson
                l.classList.remove("hidden");
                if(det) det.classList.remove("hidden");

                // highlight
                let highlighted = original;
                tokens.forEach(t=>{
                    const regex = new RegExp(`\\b(${t})\\b`, "gi");
                    highlighted = highlighted.replace(regex,
                        `<span class="highlight">$1</span>`);
                });
                l.innerHTML = highlighted;

                // 🔥 SHOW FULL PATH ONLY
                let el = l;

                while(el){
                    if(el.classList.contains("content") ||
                        el.classList.contains("sub-card") ||
                        el.classList.contains("card")){

                        el.classList.remove("hidden");

                        // expand
                        if(el.classList.contains("content")){
                            el.style.display = "block";
                        }
                    }
                    el = el.parentElement;
                }
            }
        });

        // ✅ Reset if empty search
        if(!raw){
            document.querySelectorAll(".lesson, .sub-card, .card, .content")
                .forEach(el=>{
                    el.classList.remove("hidden");
                    if(el.classList.contains("content")){
                        el.style.display = "none";
                    }
                });
        }

        

        // ✅ HIDE EMPTY GROUPS
        document.querySelectorAll(".content").forEach(c=>{
            const visible = c.querySelector(".lesson:not(.hidden)");
            c.style.display = visible ? "block" : "none";
        });
    }

    /* ---------- LOAD ---------- */
    async function load(){

        const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

        const [l1,l2,l3,l4,l5]=await Promise.all([
            supabase.from("levels").select("*"),
            supabase.from("sections").select("*"),
            supabase.from("topics").select("*"),
            supabase.from("lessons").select("*"),
            supabase.from("lesson_content").select("*")
        ]);

        appData={
            levels:l1.data||[],
            sections:l2.data||[],
            topics:l3.data||[],
            lessons:l4.data||[]
        };

        lessonContent=l5.data||[];

        buildTree();
    }

    /* ---------- INIT ---------- */
    window.onload=()=>{
        load();
        document.getElementById("search").addEventListener("input",applySearch);
        document.getElementById("knBtn").onclick=()=>{lang="kn";buildTree();};
        document.getElementById("enBtn").onclick=()=>{lang="en";buildTree();};
    };

</script>

</body>
</html>
