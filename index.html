<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnatic Learning</title>

<style>
body {
  font-family: "Noto Sans Kannada", sans-serif;
  background: #f1f5f9;
  padding: 20px;
}

h1 { text-align:center; }

.toggle {
  text-align:center;
  margin-bottom:20px;
}

button {
  padding:8px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
}

.card, .sub-card {
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.sub-card { background:#f8fafc; }

.content {
  display:none;
  padding:10px;
}

.music {
  font-family:monospace;
  border-left:4px solid #6366f1;
  padding:8px;
  margin:6px 0;
}

.theory {
  border-left:4px solid #10b981;
  padding:8px;
  margin:6px 0;
}
</style>
</head>

<body>

<h1>🎶 Carnatic Learning</h1>

<div class="toggle">
  <button onclick="setLang('kn')">ಕನ್ನಡ</button>
  <button onclick="setLang('en')">English</button>
</div>

<div id="app" class="container"></div>

<script>

let lang="kn";
const HIGH_SA="ಸ\u0307";

// ================= DATA =================

const data = [

{
title:"🎵 ಸ್ವರಾವಳಿ",
subsections:[
{
title:"ಸರಳಿ ವರಸೆಗಳು",
children:[
{title:"ಸರಳಿ 1",content:["ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ "+HIGH_SA+" ||",
HIGH_SA+" ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"]},
{title:"ಸರಳಿ 2",content:["ಸ ರಿ₁ ಸ ರಿ₁ | ಸ ರಿ₁ ಗ₃ ಮ₁ ||"]},
{title:"ಸರಳಿ 3",content:["ಸ ರಿ₁ ಗ₃ ಸ | ರಿ₁ ಗ₃ ಸ ರಿ₁ ||"]},
{title:"ಸರಳಿ 4",content:["ಸ ರಿ₁ ಗ₃ ಮ₁ | ಸ ರಿ₁ ಗ₃ ಮ₁ ||"]},
{title:"ಸರಳಿ 5",content:["ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ "+HIGH_SA+" ರಿ₁ ಸ ||"]},
{title:"ಸರಳಿ 6",content:["ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ಸ ರಿ₁ ||"]},
{title:"ಸರಳಿ 7",content:["ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ ||"]},
{title:"ಸರಳಿ 8",content:["ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ಮ₁ ಗ₃ ರಿ₁ ||"]}
]
},
{
title:"ಜಂಟಿ ವರಸೆಗಳು",
content:"<div class='theory'>Coming next (validated from your sheet)</div>"
},
{
title:"ದಾಟು ವರಸೆಗಳು",
content:"<div class='theory'>Coming next</div>"
},
{
title:"ಅಲಂಕಾರಗಳು",
content:"<div class='theory'>Coming next</div>"
}
]
},

{
title:"🎼 ಗೀತಗಳು",
subsections:[
{title:"ಲಕ್ಷಣ ಗೀತೆಗಳು",content:"<div class='theory'>To be added</div>"},
{title:"ಸರಳ ಗೀತೆಗಳು",content:"<div class='theory'>To be added</div>"}
]
},

{
title:"🎼 ವರ್ಣಗಳು",
subsections:[
{title:"ತಾನ ವರ್ಣಗಳು",content:"<div class='theory'>To be added</div>"}
]
},

{
title:"🎼 ಮೇಳಕರ್ತ ರಾಗಗಳು",
subsections:[
{
title:"ಮಾಯಾಮಾಳವಗೌಳ",
content:`
<div class="theory"><b>ಆರೋಹಣ:</b> ಸ ರಿ₁ ಗ₃ ಮ₁ ಪ ದ₁ ನಿ₃ ಸ̇</div>
<div class="theory"><b>ಅವರೋಹಣ:</b> ಸ̇ ನಿ₃ ದ₁ ಪ ಮ₁ ಗ₃ ರಿ₁ ಸ</div>
<div class="theory">
ಸ್ವರಗಳು: ಸ ರಿ₁ ಗ₃ ಮ₁ ಪ ದ₁ ನಿ₃
</div>
`
}
]
},

{
title:"📘 ಶಾಸ್ತ್ರ ಭಾಗ",
subsections:[
{
title:"7 ಸ್ವರಗಳು",
content:"<div class='theory'>ಸ ರಿ ಗ ಮ ಪ ದ ನಿ</div>"
},
{
title:"12 ಸ್ವರಸ್ಥಾನಗಳು",
content:"<div class='theory'>ರಿ₁ ರಿ₂ ಗ₁ ಗ₂ ಮ₁ ಮ₂ ದ₁ ದ₂ ನಿ₁ ನಿ₂ ...</div>"
},
{
title:"ತಾಳ",
content:"<div class='theory'>ಆದಿ ತಾಳ, ರೂಪಕ ತಾಳ</div>"
},
{
title:"ರಾಗ ಲಕ್ಷಣ",
content:"<div class='theory'>ರಾಗದ ಸ್ವರೂಪ ವಿವರಣೆ</div>"
}
]
}

];

// ================= RENDER =================

const app=document.getElementById("app");

data.forEach(section=>{
const card=createCard(section.title);
const content=createContent();

section.subsections.forEach(sub=>{
const subCard=createSubCard(sub.title);
const subContent=createContent();

if(sub.children){
sub.children.forEach(c=>{
subContent.innerHTML+=`<div class="music">${c.content.join("<br>")}</div>`;
});
}else{
subContent.innerHTML=sub.content;
}

attachToggle(subCard,subContent);
content.append(subCard,subContent);
});

attachToggle(card,content);
app.append(card,content);
});

// ================= HELPERS =================

function createCard(t){
const d=document.createElement("div");
d.className="card";
d.innerHTML=t+" <span>▼</span>";
return d;
}

function createSubCard(t){
const d=document.createElement("div");
d.className="sub-card";
d.innerHTML=t+" <span>▶</span>";
return d;
}

function createContent(){
const d=document.createElement("div");
d.className="content";
return d;
}

function attachToggle(c,ct){
c.onclick=(e)=>{
e.stopPropagation();
ct.style.display=ct.style.display==="block"?"none":"block";
};
}

function setLang(l){ lang=l; }

</script>

</body>
</html>
