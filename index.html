<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnatic Learning</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            background: #6366f1;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card, .sub-card {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .card { font-weight: bold; }
        .sub-card { margin-left: 10px; }

        .content {
            display: none;
            margin-left: 15px;
        }

        .lesson {
            padding: 6px;
            margin: 4px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }

        .toggle-bar button {
            margin-right: 10px;
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="header">Carnatic Learning</div>
<div id="app" class="container">Initializing...</div>

<script>

    window.onload = function () {

        const SUPABASE_URL = "https://jlnyecsqjdphgsaabyja.supabase.co";
        const SUPABASE_KEY = "sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk";

        const app = document.getElementById("app");

        let lang = "kn";
        let appData = null;

// ===== SAFE NAME =====
        function getName(obj, type) {

            if (type === "level") {
                return lang === "kn"
                    ? (obj.name_kn || "ಜೂನಿಯರ್")
                    : (obj.name_en || "Junior");
            }

            return lang === "kn"
                ? (obj.name_kn || obj.name)
                : (obj.name_en || obj.name);
        }

// ===== UI HELPERS =====
        function createDiv(cls, text) {
            const d = document.createElement("div");
            d.className = cls;
            d.innerText = text;
            return d;
        }

        function toggle(card, content) {
            card.onclick = () => {
                content.style.display =
                    content.style.display === "block" ? "none" : "block";
            };
        }

// ===== MAIN RENDER =====
        function render() {

            if (!appData) return;

            // FULL RESET
            app.innerHTML = "";

            // ===== TOGGLE BAR =====
            const bar = document.createElement("div");
            bar.style.marginBottom = "15px";

            const knBtn = document.createElement("button");
            knBtn.innerText = "ಕನ್ನಡ";

            const enBtn = document.createElement("button");
            enBtn.innerText = "English";

            // CRITICAL: force re-render
            knBtn.addEventListener("click", () => {
                lang = "kn";
                render();
            });

            enBtn.addEventListener("click", () => {
                lang = "en";
                render();
            });

            bar.appendChild(knBtn);
            bar.appendChild(enBtn);
            app.appendChild(bar);

            const { levels, sections, topics, lessons } = appData;

            levels.forEach(level => {

                const levelName = (lang === "kn")
                    ? (level.name_kn || "ಜೂನಿಯರ್")
                    : (level.name_en || "Junior");

                const levelCard = createDiv("card", levelName);
                const levelContent = createDiv("content", "");

                sections.filter(s => s.level_id === level.id)
                    .forEach(section => {

                        const sectionCard = createDiv("sub-card", getName(section));
                        const sectionContent = createDiv("content", "");

                        topics.filter(t => t.section_id === section.id)
                            .forEach(topic => {

                                const topicCard = createDiv("sub-card", getName(topic));
                                const topicContent = createDiv("content", "");

                                lessons.filter(l => l.topic_id === topic.id)
                                    .forEach(lesson => {

                                        const lessonDiv = createDiv("lesson", getName(lesson));
                                        topicContent.appendChild(lessonDiv);
                                    });

                                toggle(topicCard, topicContent);
                                sectionContent.appendChild(topicCard);
                                sectionContent.appendChild(topicContent);
                            });

                        toggle(sectionCard, sectionContent);
                        levelContent.appendChild(sectionCard);
                        levelContent.appendChild(sectionContent);
                    });

                toggle(levelCard, levelContent);
                app.appendChild(levelCard);
                app.appendChild(levelContent);
            });
        }

// ===== LOAD =====
        async function loadApp() {

            try {

                if (!window.supabase) {
                    app.innerHTML = "Supabase not loaded";
                    return;
                }

                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                app.innerText = "Loading...";

                const [l1, l2, l3, l4] = await Promise.all([
                    supabase.from("levels").select("*"),
                    supabase.from("sections").select("*"),
                    supabase.from("topics").select("*"),
                    supabase.from("lessons").select("*")
                ]);

                if (l1.error) throw l1.error;
                if (l2.error) throw l2.error;
                if (l3.error) throw l3.error;
                if (l4.error) throw l4.error;

                appData = {
                    levels: l1.data,
                    sections: l2.data,
                    topics: l3.data,
                    lessons: l4.data
                };

                render();

            } catch (err) {
                console.error(err);
                app.innerHTML = "ERROR: " + err.message;
            }
        }

        loadApp();

    };

</script>

</body>
</html>
