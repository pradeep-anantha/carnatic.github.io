<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnatic Learning</title>

<style>
body {
  font-family: "Noto Sans Kannada", sans-serif;
  background: #f1f5f9;
  padding: 20px;
}

h1 { text-align:center; }

.toggle {
  text-align:center;
  margin-bottom:20px;
}

button {
  padding:8px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

.container {
  max-width:900px;
  margin:auto;
}

.card, .sub-card {
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.sub-card { background:#f8fafc; }

.content {
  display:none;
  padding:10px;
}

.music {
  font-family:monospace;
  font-size:18px;
  padding:8px;
  margin:6px 0;
  border-left:4px solid #6366f1;
}

.theory {
  padding:8px;
  margin:6px 0;
  border-left:4px solid #10b981;
}
</style>
</head>

<body>

<h1>🎶 Carnatic Learning</h1>

<div class="toggle">
  <button onclick="setLang('kn')">ಕನ್ನಡ</button>
  <button onclick="setLang('en')">English</button>
</div>

<div id="app" class="container"></div>

<script>

// ================= CONFIG =================
let lang = "kn";
const HIGH_SA_KN = "ಸ\u0307";
const HIGH_SA_EN = "Ṡ";

// ================= CONVERSION =================
function toKannada(text){
  return text
  .replace(/S/g,"ಸ")
  .replace(/R1/g,"ರಿ₁")
  .replace(/G3/g,"ಗ₃")
  .replace(/M1/g,"ಮ₁")
  .replace(/P/g,"ಪ")
  .replace(/D1/g,"ದ₁")
  .replace(/N3/g,"ನಿ₃")
  .replace(/Ṡ/g,HIGH_SA_KN);
}

// ================= DATA =================

const saraliRaw = [
[
["S R G M","P D N Ṡ"],
["Ṡ N D P","M G R S"]
],
[
["S R S R","S R G M"],
["S R G M","P D N Ṡ"],
["Ṡ N Ṡ N","Ṡ N D P"],
["Ṡ N D P","M G R S"]
],
[
["S R G S","R G S R"],
["S R G M","P D N Ṡ"],
["Ṡ N D Ṡ","N D Ṡ N"],
["Ṡ N D P","M G R S"]
],
[
["S R G M","S R G M"],
["S R G M","P D N Ṡ"],
["Ṡ N D P","Ṡ N D P"],
["Ṡ N D P","M G R S"]
],
[
["S R G M","P Ṡ R S"],
["S R G M","P D N Ṡ"],
["Ṡ N D P","M Ṡ N"],
["Ṡ N D P","M G R S"]
],
[
["S R G M","P D S R"],
["S R G M","P D N Ṡ"],
["Ṡ N D P","M G Ṡ N"],
["Ṡ N D P","M G R S"]
],
[
["S R G M","P D N"],
["S R G M","P D N Ṡ"],
["Ṡ N D P","M G R"],
["Ṡ N D P","M G R S"]
],
[
["S R G M","P M G R"],
["S R G M","P D N Ṡ"],
["Ṡ N D P","M P D N"],
["Ṡ N D P","M G R S"]
]
];

// ================= BUILD =================

function buildUI(){

const app = document.getElementById("app");
app.innerHTML = "";

// ===== SWARAVALI =====
const swara = createCard("🎵 ಸ್ವರಾವಳಿ");
const swaraContent = createContent();

const saraliCard = createSubCard("ಸರಳಿ ವರಸೆಗಳು");
const saraliContent = createContent();

saraliRaw.forEach((lesson, i)=>{

  const lessonCard = createSubCard(`ಸರಳಿ ${i+1}`);
  const lessonContent = createContent();

  lesson.forEach(line=>{
    let text = line.join(" | ") + " ||";

    if(lang==="kn") text = toKannada(text);

    lessonContent.innerHTML += `<div class="music">${text}</div>`;
  });

  attachToggle(lessonCard, lessonContent);
  saraliContent.append(lessonCard, lessonContent);
});

attachToggle(saraliCard, saraliContent);
swaraContent.append(saraliCard, saraliContent);

// placeholders
swaraContent.append(createPlaceholder("ಜಂಟಿ ವರಸೆಗಳು"));
swaraContent.append(createPlaceholder("ದಾಟು ವರಸೆಗಳು"));
swaraContent.append(createPlaceholder("ಅಲಂಕಾರಗಳು"));

attachToggle(swara.card, swaraContent);

// ===== RAGA =====
const raga = createCard("🎼 ಮೇಳಕರ್ತ ರಾಗಗಳು");
const ragaContent = createContent();

const mmgCard = createSubCard("ಮಾಯಾಮಾಳವಗೌಳ");
const mmgContent = createContent();

let aro = "S R1 G3 M1 P D1 N3 Ṡ";
let ava = "Ṡ N3 D1 P M1 G3 R1 S";

if(lang==="kn"){
  aro = toKannada(aro);
  ava = toKannada(ava);
}

mmgContent.innerHTML = `
<div class="theory"><b>ಆರೋಹಣ:</b> ${aro}</div>
<div class="theory"><b>ಅವರೋಹಣ:</b> ${ava}</div>
<div class="theory">ಸ್ವರಗಳು: ${lang==="kn" ? "ಸ ರಿ₁ ಗ₃ ಮ₁ ಪ ದ₁ ನಿ₃" : "S R1 G3 M1 P D1 N3"}</div>
`;

attachToggle(mmgCard, mmgContent);
ragaContent.append(mmgCard, mmgContent);

attachToggle(raga.card, ragaContent);

// ===== THEORY =====
const theory = createCard("📘 ಶಾಸ್ತ್ರ ಭಾಗ");
const theoryContent = createContent();

theoryContent.innerHTML = `
<div class="theory">7 Swaras: ${lang==="kn"?"ಸ ರಿ ಗ ಮ ಪ ದ ನಿ":"S R G M P D N"}</div>
<div class="theory">12 Swarasthanas</div>
`;

attachToggle(theory.card, theoryContent);

// ===== APPEND =====
app.append(
  swara.card, swaraContent,
  raga.card, ragaContent,
  theory.card, theoryContent
);
}

// ================= HELPERS =================

function createCard(title){
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML=title+" <span>▼</span>";
  return {card};
}

function createSubCard(title){
  const d=document.createElement("div");
  d.className="sub-card";
  d.innerHTML=title+" <span>▶</span>";
  return d;
}

function createContent(){
  const d=document.createElement("div");
  d.className="content";
  return d;
}

function createPlaceholder(title){
  const c = createSubCard(title);
  const ct = createContent();
  ct.innerHTML = "<div class='theory'>Coming next</div>";
  attachToggle(c, ct);
  return [c, ct];
}

function attachToggle(c,ct){
  c.onclick=(e)=>{
    e.stopPropagation();
    ct.style.display = ct.style.display==="block"?"none":"block";
  };
}

// ================= LANG =================
function setLang(l){
  lang=l;
  buildUI();
}

// INIT
buildUI();

</script>

</body>
</html>
