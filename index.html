<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnatic Flute Syllabus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f5f6fa;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: white;
  padding: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  z-index: 10;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.tabs button {
  padding: 8px 14px;
  border: none;
  border-radius: 20px;
  background: #e0e0e0;
  cursor: pointer;
}

.tabs button.active {
  background: #4CAF50;
  color: white;
}

/* SEARCH */
.search {
  margin-top: 10px;
}

.search input {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* CONTENT */
.container {
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  margin-bottom: 12px;
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* CATEGORY */
.category {
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

/* ITEMS */
.item {
  margin-left: 10px;
  padding: 4px 0;
  font-size: 14px;
}

/* COLLAPSE */
.hidden {
  display: none;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">🎶 Carnatic Flute Syllabus</div>

  <!-- LEVEL -->
  <div id="levelTabs" class="tabs"></div>

  <!-- SECTIONS -->
  <div id="sectionTabs" class="tabs"></div>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" placeholder="Search raga / kriti..." onkeyup="searchData(this.value)">
  </div>
</div>

<div class="container" id="content"></div>

<script>

// ==========================
// SUPABASE CONFIG
// ==========================
const SUPABASE_URL = "https://jlnyecsqjdphgsaabyja.supabase.co";
const SUPABASE_KEY = "sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==========================
// STATE
// ==========================
let currentData = [];
let currentLevel = '';
let currentSection = '';

// ==========================
// LOAD LEVELS
// ==========================
async function init() {
  const { data } = await supabase.from('levels').select('*');

  const levelTabs = document.getElementById('levelTabs');

  data.forEach(l => {
    const btn = document.createElement('button');
    btn.innerText = l.name;
    btn.onclick = () => loadLevel(l.name, btn);
    levelTabs.appendChild(btn);
  });

  loadLevel('Junior', levelTabs.children[0]);
}

// ==========================
// LOAD LEVEL
// ==========================
async function loadLevel(levelName, btn) {

  currentLevel = levelName;

  setActive('levelTabs', btn);

  const { data } = await supabase
    .from('sections')
    .select('id, name, levels(name)')
    .eq('levels.name', levelName);

  const sectionTabs = document.getElementById('sectionTabs');
  sectionTabs.innerHTML = '';

  data.forEach((s, i) => {
    const b = document.createElement('button');
    b.innerText = s.name;
    b.onclick = () => loadSection(s.id, b);
    sectionTabs.appendChild(b);

    if (i === 0) loadSection(s.id, b);
  });
}

// ==========================
// LOAD SECTION
// ==========================
async function loadSection(sectionId, btn) {

  currentSection = sectionId;
  setActive('sectionTabs', btn);

  const { data } = await supabase
    .from('syllabus')
    .select(`
      id,
      content_type,
      value,
      notes,
      categories(name),
      subcategories(name)
    `)
    .eq('section_id', sectionId);

  currentData = data;
  render(data);
}

// ==========================
// RENDER
// ==========================
function render(data) {

  const container = document.getElementById('content');
  container.innerHTML = '';

  const grouped = {};

  data.forEach(item => {
    const cat = item.categories?.name || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  });

  Object.keys(grouped).forEach(cat => {

    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'category';
    header.innerText = cat;

    const list = document.createElement('div');

    header.onclick = () => list.classList.toggle('hidden');

    grouped[cat].forEach(item => {

      const div = document.createElement('div');
      div.className = 'item';

      let text = '';

      if (item.subcategories?.name) {
        text += item.subcategories.name + ': ';
      }

      if (item.content_type === 'count') {
        text += item.value;
      }

      if (item.content_type === 'text') {
        text += item.value;
      }

      if (item.notes) {
        text += ` (${item.notes})`;
      }

      div.innerText = text;
      list.appendChild(div);
    });

    card.appendChild(header);
    card.appendChild(list);
    container.appendChild(card);
  });
}

// ==========================
// SEARCH
// ==========================
function searchData(query) {

  query = query.toLowerCase();

  const filtered = currentData.filter(item => {
    return (
      item.value?.toLowerCase().includes(query) ||
      item.notes?.toLowerCase().includes(query) ||
      item.categories?.name?.toLowerCase().includes(query)
    );
  });

  render(filtered);
}

// ==========================
// ACTIVE TAB
// ==========================
function setActive(parentId, btn) {
  const parent = document.getElementById(parentId);
  Array.from(parent.children).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// INIT
init();

</script>

</body>
</html>
