<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಪ್ರಾಥಮಿಕ ಹಂತ - ಶ್ರೇಣಿ ಪತ್ರಿಕೆ</title>

<style>
body {
  font-family: "Noto Sans Kannada", Arial, sans-serif;
  background: #f3f4f6;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: #fff;
  border-radius: 12px;
  margin-bottom: 15px;
  padding: 15px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.content {
  display: none;
  background: #fff;
  border-radius: 12px;
  margin-top: -10px;
  margin-bottom: 15px;
  padding: 15px;
}

ul {
  margin: 0;
  padding-left: 20px;
}

</style>
</head>

<body>

<h1>🎶 ಪ್ರಾಥಮಿಕ ಹಂತ - ಶ್ರೇಣಿ ಪತ್ರಿಕೆ</h1>

<div class="container" id="app"></div>

<script>
// ================= DATA =================
const data = [
  {
    title: "🎵 ಪ್ರಾಯೋಗಿಕ ಪತ್ರಿಕೆ - 1",
    content: `
      <ul>
        <li>ಸರಳಿ ವರಸೆಗಳು – 7</li>
        <li>ಜಂಟಿ ವರಸೆಗಳು – 5</li>
        <li>ಸ್ಥಾಯಿ ಅಲಂಕಾರಗಳು – 7</li>
        <li>ದಾಟು ವರಸೆಗಳು – 4</li>
        <li>ತಾರಸ್ಥಾಯಿ – 3</li>
        <li>ಮಂದ್ರಸ್ಥಾಯಿ – 3</li>
        <br>
        <li><strong>ಗೀತೆಗಳು – 10</strong></li>
        <li>ಪಿಳ್ಳಾರಿ – 4</li>
        <li>ಸಂಚಾರಿ – 4</li>
        <li>ಲಕ್ಷಣ – 2</li>
        <br>
        <li>ಜತಿಸ್ವರಗಳು – 4</li>
      </ul>
    `
  },
  {
    title: "🎼 ಪ್ರಾಯೋಗಿಕ ಪತ್ರಿಕೆ - 2",
    content: `
      <ul>
        <li><strong>ತಾನವರ್ಣಗಳು – 4</strong></li>
        <li>ಶಂಕರಾಭರಣಂ</li>
        <li>ಹಂಸಧ್ವನಿ</li>
        <li>ಕಲ್ಯಾಣಿ</li>
        <li>ಶ್ರೀರಾಗ</li>
        <li>ಮೋಹನಂ</li>
        <li>ಅಭೋಗಿ</li>
        <li>ವಸಂತ</li>
        <li>ಕಾಂಭೋಜಿ</li>
        <br>
        <li>ಮಧ್ಯಮ ಕಾಲ ಕೃತಿಗಳು – 10</li>
        <li>ವಿಲಂಬ ಕಾಲ ಕೃತಿಗಳು – 5</li>
      </ul>
    `
  },
  {
    title: "📘 ಶಾಸ್ತ್ರ ಭಾಗ",
    content: `
      <ul>
        <li>ಸಂಗೀತದ ವ್ಯಾಖ್ಯಾನ</li>
        <li>ಸ್ವರಗಳು</li>
        <li>ಸ್ಥಾಯಿಗಳು</li>
        <li>ರಾಗ ಜ್ಞಾನ</li>
        <li>ತಾಳ</li>
        <li>ವಾದ್ಯಗಳು</li>
      </ul>
    `
  }
];

// ================= RENDER =================
const app = document.getElementById("app");

data.forEach((section, index) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `${section.title} <span>▼</span>`;

  const content = document.createElement("div");
  content.className = "content";
  content.innerHTML = section.content;

  card.onclick = () => {
    content.style.display = content.style.display === "block" ? "none" : "block";
  };

  app.appendChild(card);
  app.appendChild(content);
});
</script>

</body>
</html>
