<script>
// ================= HELPERS =================

// safe high Sa (dot above)
const HIGH_SA = "ಸ\u0307";

// ================= DATA =================

const saraliData = [
  {
    title: "ಸರಳಿ 1",
    lines: [
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  },
  {
    title: "ಸರಳಿ 2",
    lines: [
      "ಸ ರಿ₁ ಸ ರಿ₁ | ಸ ರಿ₁ ಗ₃ ಮ₁ ||",
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ " + HIGH_SA + " ನಿ₃ | " + HIGH_SA + " ನಿ₃ ದ₁ ಪ ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  },
  {
    title: "ಸರಳಿ 3",
    lines: [
      "ಸ ರಿ₁ ಗ₃ ಸ | ರಿ₁ ಗ₃ ಸ ರಿ₁ ||",
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ ದ₁ " + HIGH_SA + " | ನಿ₃ ದ₁ " + HIGH_SA + " ನಿ₃ ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  },
  {
    title: "ಸರಳಿ 4",
    lines: [
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಸ ರಿ₁ ಗ₃ ಮ₁ ||",
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | " + HIGH_SA + " ನಿ₃ ದ₁ ಪ ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  },
  {
    title: "ಸರಳಿ 5",
    lines: [
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ " + HIGH_SA + " ರಿ₁ ಸ ||",
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ " + HIGH_SA + " ನಿ₃ ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  },
  {
    title: "ಸರಳಿ 6",
    lines: [
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ಸ ರಿ₁ ||",
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ " + HIGH_SA + " ನಿ₃ ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  },
  {
    title: "ಸರಳಿ 7",
    lines: [
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ ~ ||",
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ~ ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  },
  {
    title: "ಸರಳಿ 8",
    lines: [
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ಮ₁ ಗ₃ ರಿ₁ ||",
      "ಸ ರಿ₁ ಗ₃ ಮ₁ | ಪ ದ₁ ನಿ₃ " + HIGH_SA + " ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಪ ದ₁ ನಿ₃ ||",
      HIGH_SA + " ನಿ₃ ದ₁ ಪ | ಮ₁ ಗ₃ ರಿ₁ ಸ ||"
    ]
  }
];

// ================= MAIN DATA =================

const data = [
  {
    title: "🎵 ಪ್ರಾಯೋಗಿಕ ಪತ್ರಿಕೆ - 1",
    subsections: [
      {
        title: "ಸರಳಿ ವರಸೆಗಳು",
        children: saraliData.map(sarali => ({
          title: sarali.title,
          content: sarali.lines.map(l => `<div>${l}</div>`).join("")
        }))
      }
    ]
  }
];

// ================= RENDER =================

const app = document.getElementById("app");

data.forEach(section => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `${section.title} <span>▼</span>`;

  const content = document.createElement("div");
  content.className = "content";

  section.subsections.forEach(sub => {

    const subCard = document.createElement("div");
    subCard.className = "sub-card";
    subCard.innerHTML = `${sub.title} <span>▶</span>`;

    const subContent = document.createElement("div");
    subContent.className = "content";

    sub.children.forEach(child => {
      const childCard = document.createElement("div");
      childCard.className = "sub-card";
      childCard.style.marginLeft = "15px";
      childCard.innerHTML = `${child.title} <span>▶</span>`;

      const childContent = document.createElement("div");
      childContent.className = "content";
      childContent.style.marginLeft = "20px";
      childContent.innerHTML = child.content;

      childCard.onclick = (e) => {
        e.stopPropagation();
        childContent.style.display =
          childContent.style.display === "block" ? "none" : "block";
      };

      subContent.appendChild(childCard);
      subContent.appendChild(childContent);
    });

    subCard.onclick = (e) => {
      e.stopPropagation();
      subContent.style.display =
        subContent.style.display === "block" ? "none" : "block";
    };

    content.appendChild(subCard);
    content.appendChild(subContent);
  });

  card.onclick = () => {
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  };

  app.appendChild(card);
  app.appendChild(content);
});
</script>
