<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnatic Learning</title>

<!-- Correct Supabase UMD -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  background: #6366f1;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card, .sub-card {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.card { font-weight: bold; }
.sub-card { margin-left: 10px; }

.content {
  display: none;
  margin-left: 15px;
}

.lesson {
  padding: 6px;
  margin: 4px 0;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="header">Carnatic Learning</div>
<div id="app" class="container">Initializing...</div>

<script>

// ================= CONFIG =================
// 🔴 REPLACE THESE WIhttps://jlnyecsqjdphgsaabyja.supabase.co
const SUPABASE_URL = "https://jlnyecsqjdphgsaabyja.supabase.co";
const SUPABASE_KEY = "sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk";

// ================= INIT =================
const app = document.getElementById("app");

function showError(msg) {
  app.innerHTML = "<b>Error:</b> " + msg;
}

function createDiv(className, text) {
  const d = document.createElement("div");
  d.className = className;
  d.innerText = text;
  return d;
}

function toggle(card, content) {
  card.onclick = () => {
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  };
}

// ================= MAIN =================
async function loadApp() {

  try {

    // Check library
    if (!window.supabase) {
      showError("Supabase library not loaded");
      return;
    }

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    app.innerText = "Loading data...";

    // Fetch all
    const { data: levels, error: e1 } = await supabase.from("levels").select("*");
    if (e1) throw e1;

    const { data: sections, error: e2 } = await supabase.from("sections").select("*");
    if (e2) throw e2;

    const { data: topics, error: e3 } = await supabase.from("topics").select("*");
    if (e3) throw e3;

    const { data: lessons, error: e4 } = await supabase.from("lessons").select("*");
    if (e4) throw e4;

    if (!levels || levels.length === 0) {
      showError("No data found in levels table");
      return;
    }

    app.innerHTML = "";

    // Build UI
    levels.forEach(level => {

      const levelCard = createDiv("card", level.name);
      const levelContent = createDiv("content", "");

      sections
        .filter(s => s.level_id === level.id)
        .forEach(section => {

          const sectionCard = createDiv("sub-card", section.name);
          const sectionContent = createDiv("content", "");

          topics
            .filter(t => t.section_id === section.id)
            .forEach(topic => {

              const topicCard = createDiv("sub-card", topic.name);
              const topicContent = createDiv("content", "");

              lessons
                .filter(l => l.topic_id === topic.id)
                .forEach(lesson => {

                  const lessonDiv = createDiv("lesson", lesson.name);
                  topicContent.appendChild(lessonDiv);
                });

              toggle(topicCard, topicContent);
              sectionContent.appendChild(topicCard);
              sectionContent.appendChild(topicContent);
            });

          toggle(sectionCard, sectionContent);
          levelContent.appendChild(sectionCard);
          levelContent.appendChild(sectionContent);
        });

      toggle(levelCard, levelContent);
      app.appendChild(levelCard);
      app.appendChild(levelContent);
    });

  } catch (err) {
    console.error(err);
    showError(err.message);
  }
}

// Run
loadApp();

</script>

</body>
</html>
