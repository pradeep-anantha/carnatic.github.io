<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಪ್ರಾಥಮಿಕ ಹಂತ</title>

<style>
body {
  font-family: "Noto Sans Kannada", Arial;
  background: #f3f4f6;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 800px;
  margin: auto;
}

/* Level 1 */
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

/* Level 2 */
.sub-card {
  background: #f9fafb;
  padding: 12px;
  border-radius: 10px;
  margin: 8px 0;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

/* Content */
.content {
  display: none;
  padding: 10px 15px;
}

ul {
  margin: 0;
  padding-left: 20px;
}
</style>
</head>

<body>

<h1>🎶 ಪ್ರಾಥಮಿಕ ಹಂತ - ಶ್ರೇಣಿ ಪತ್ರಿಕೆ</h1>

<div id="app" class="container"></div>

<script>
// ================= DATA =================
const data = [
  {
    title: "🎵 ಪ್ರಾಯೋಗಿಕ ಪತ್ರಿಕೆ - 1",
    subsections: [
      {
        title: "ಸರಳಿ ವರಸೆಗಳು",
        content: `
          <ul>
            <li>ಸರಳಿ 1</li>
            <li>ಸರಳಿ 2</li>
            <li>ಸರಳಿ 3</li>
            <li>ಸರಳಿ 4</li>
            <li>ಸರಳಿ 5</li>
            <li>ಸರಳಿ 6</li>
            <li>ಸರಳಿ 7</li>
          </ul>
        `
      },
      {
        title: "ಜಂಟಿ ವರಸೆಗಳು",
        content: `
          <ul>
            <li>ಜಂಟಿ 1</li>
            <li>ಜಂಟಿ 2</li>
            <li>ಜಂಟಿ 3</li>
            <li>ಜಂಟಿ 4</li>
            <li>ಜಂಟಿ 5</li>
          </ul>
        `
      },
      {
        title: "ಗೀತೆಗಳು",
        content: `
          <ul>
            <li>ಪಿಳ್ಳಾರಿ – 4</li>
            <li>ಸಂಚಾರಿ – 4</li>
            <li>ಲಕ್ಷಣ – 2</li>
          </ul>
        `
      }
    ]
  },

  {
    title: "🎼 ಪ್ರಾಯೋಗಿಕ ಪತ್ರಿಕೆ - 2",
    subsections: [
      {
        title: "ರಾಗಗಳು",
        content: `
          <ul>
            <li>ಶಂಕರಾಭರಣಂ</li>
            <li>ಹಂಸಧ್ವನಿ</li>
            <li>ಕಲ್ಯಾಣಿ</li>
            <li>ಶ್ರೀರಾಗ</li>
            <li>ಮೋಹನಂ</li>
            <li>ಅಭೋಗಿ</li>
            <li>ವಸಂತ</li>
            <li>ಕಾಂಭೋಜಿ</li>
          </ul>
        `
      },
      {
        title: "ಕೃತಿಗಳು",
        content: `
          <ul>
            <li>ಮಧ್ಯಮ ಕಾಲ – 10</li>
            <li>ವಿಲಂಬ ಕಾಲ – 5</li>
          </ul>
        `
      }
    ]
  },

  {
    title: "📘 ಶಾಸ್ತ್ರ ಭಾಗ",
    subsections: [
      {
        title: "ಮೂಲಭೂತ ಸಂಗೀತ",
        content: `
          <ul>
            <li>ಸಂಗೀತ</li>
            <li>ಸ್ವರಗಳು</li>
            <li>ಸ್ಥಾಯಿಗಳು</li>
          </ul>
        `
      },
      {
        title: "ರಾಗ ಲಕ್ಷಣ",
        content: `
          <ul>
            <li>ಶಂಕರಾಭರಣಂ</li>
            <li>ಕಲ್ಯಾಣಿ</li>
            <li>ಮೋಹನಂ</li>
          </ul>
        `
      }
    ]
  }
];

// ================= RENDER =================
const app = document.getElementById("app");

data.forEach(section => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `${section.title} <span>▼</span>`;

  const content = document.createElement("div");
  content.className = "content";

  section.subsections.forEach(sub => {
    const subCard = document.createElement("div");
    subCard.className = "sub-card";
    subCard.innerHTML = `${sub.title} <span>▶</span>`;

    const subContent = document.createElement("div");
    subContent.className = "content";
    subContent.innerHTML = sub.content;

    subCard.onclick = (e) => {
      e.stopPropagation();
      subContent.style.display =
        subContent.style.display === "block" ? "none" : "block";
    };

    content.appendChild(subCard);
    content.appendChild(subContent);
  });

  card.onclick = () => {
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  };

  app.appendChild(card);
  app.appendChild(content);
});
</script>

</body>
</html>
