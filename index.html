<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnatic Flute Syllabus</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 10px;
}

button {
  margin: 4px;
  padding: 6px 12px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

button:hover {
  background: #eee;
}

.container {
  margin-top: 15px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<h2>Carnatic Flute Syllabus</h2>

<div id="status">Loading...</div>

<div id="levels"></div>
<div id="sections"></div>

<div id="content" class="container"></div>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  "https://jlnyecsqjdphgsaabyja.supabase.co",
  "sb_publishable_z9hMCoKuhSaVC8EmPxj8Pg_nc6coxZk"
);

const statusDiv = document.getElementById("status");
const levelsDiv = document.getElementById("levels");
const sectionsDiv = document.getElementById("sections");
const contentDiv = document.getElementById("content");

let categoriesMap = {};
let subcategoriesMap = {};

// =======================
// INIT
// =======================
async function init() {

  try {

    statusDiv.innerText = "Loading data...";

    // Load categories
    const catRes = await supabase.from('categories').select('*');
    if (catRes.data) {
      catRes.data.forEach(c => {
        categoriesMap[c.id] = c.name;
      });
    }

    // Load subcategories
    const subRes = await supabase.from('subcategories').select('*');
    if (subRes.data) {
      subRes.data.forEach(s => {
        subcategoriesMap[s.id] = s.name;
      });
    }

    // Load levels
    const { data: levels, error } = await supabase
      .from('levels')
      .select('*');

    if (error) {
      statusDiv.innerText = "Error loading levels";
      return;
    }

    levelsDiv.innerHTML = "";

    levels.forEach(level => {
      const btn = document.createElement("button");
      btn.innerText = level.name;

      btn.onclick = () => loadSections(level.id);

      levelsDiv.appendChild(btn);
    });

    statusDiv.innerText = "Ready";

  } catch (err) {
    statusDiv.innerText = "Error: " + err.message;
  }
}

// =======================
// LOAD SECTIONS
// =======================
async function loadSections(levelId) {

  sectionsDiv.innerHTML = "";
  contentDiv.innerHTML = "";

  const { data: sections } = await supabase
    .from('sections')
    .select('*')
    .eq('level_id', levelId);

  if (!sections) {
    statusDiv.innerText = "No sections found";
    return;
  }

  sections.forEach(section => {
    const btn = document.createElement("button");
    btn.innerText = section.name;

    btn.onclick = () => loadSyllabus(section.id);

    sectionsDiv.appendChild(btn);
  });
}

// =======================
// LOAD SYLLABUS
// =======================
async function loadSyllabus(sectionId) {

  contentDiv.innerHTML = "";

  const { data: syllabus } = await supabase
    .from('syllabus')
    .select('*')
    .eq('section_id', sectionId);

  if (!syllabus) {
    statusDiv.innerText = "No syllabus data";
    return;
  }

  const grouped = {};

  syllabus.forEach(item => {
    const category = categoriesMap[item.category_id] || "Other";

    if (!grouped[category]) {
      grouped[category] = [];
    }

    grouped[category].push(item);
  });

  Object.keys(grouped).forEach(category => {

    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("div");
    title.style.fontWeight = "bold";
    title.innerText = category;

    card.appendChild(title);

    grouped[category].forEach(item => {

      const row = document.createElement("div");

      let text = "";

      if (item.subcategory_id && subcategoriesMap[item.subcategory_id]) {
        text += subcategoriesMap[item.subcategory_id] + ": ";
      }

      text += item.value || "";

      if (item.notes) {
        text += " (" + item.notes + ")";
      }

      row.innerText = text;
      card.appendChild(row);
    });

    contentDiv.appendChild(card);
  });
}

// START
init();

</script>

</body>
</html>
