<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carnatic Learning App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">

<!-- HEADER -->
<header class="flex justify-between items-center p-4 border-b border-gray-700 bg-black">
  <h1 id="title" class="text-xl font-bold">Carnatic Learning</h1>

  <div class="flex gap-2">
    <button onclick="setLanguage('en')" class="px-3 py-1 bg-indigo-600 rounded">English</button>
    <button onclick="setLanguage('kn')" class="px-3 py-1 bg-indigo-600 rounded">ಕನ್ನಡ</button>
  </div>
</header>

<!-- TABS -->
<nav id="tabs" class="flex flex-wrap gap-3 p-4 bg-gray-800 border-b border-gray-700"></nav>

<!-- CONTENT -->
<main id="content" class="p-6 text-lg">
  Click a tab to start
</main>

<script src="js/app.js"></script>
</body>
</html>
